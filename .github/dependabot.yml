version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      - dependency-name: evalexpr
        versions:
          - ">= 12"
    groups:
      patch-updates:
        update-types:
          - patch
    cooldown:
      default-days: 7

  - package-ecosystem: cargo
    directory: /ebpf
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      patch-updates:
        update-types:
          - patch
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
    cooldown:
      default-days: 7
