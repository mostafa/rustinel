changelog:
  categories:
    - title: Features
      labels:
        - feature
        - feat
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
        - bugfix
    - title: Refactoring
      labels:
        - refactor
        - refactoring
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: CI and release
      labels:
        - ci
        - ci-cd
        - workflow
    - title: Dependencies
      labels:
        - dependencies
    - title: Maintenance
      labels:
        - chore
        - maintenance
    - title: Other Changes
      labels:
        - "*"
