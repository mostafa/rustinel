name: CI/CD

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Clippy ──────────────────────────────────────────────────────────────────
  # Run on both platforms so Linux-specific code (aya, libc) and
  # Windows-specific code (ferrisetw, windows-rs) are each linted natively.
  clippy-linux:
    name: Clippy (Linux)
    runs-on: ubuntu-latest
    needs: ebpf-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Download eBPF artifact
        uses: actions/download-artifact@v8
        with:
          name: rustinel-ebpf-object
          path: ebpf/
      - run: cargo clippy --locked --all-targets -- -D clippy::all

  clippy-windows:
    name: Clippy (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --all-targets -- -D clippy::all

# ── eBPF Build ──────────────────────────────────────────────────────────────
  # Produces the BPF bytecode object that is embedded into the Linux binary
  # at compile time (build.rs looks for ebpf/rustinel-ebpf.o).
  # The bpfel-unknown-none target is architecture-agnostic, so one artifact
  # serves both x86_64 and arm64 Linux.
  ebpf-build:
    name: Linux eBPF Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup nightly Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Cache bpf-linker binary
        id: cache-bpf-linker
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/bpf-linker
          key: bpf-linker-${{ runner.os }}-${{ hashFiles('ebpf/Cargo.toml') }}

      - name: Install bpf-linker
        if: steps.cache-bpf-linker.outputs.cache-hit != 'true'
        run: cargo install bpf-linker

      - name: Build eBPF object
        run: |
          cd ebpf
          cargo build --release
          cp target/bpfel-unknown-none/release/rustinel-ebpf rustinel-ebpf.o

      - name: Upload eBPF artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustinel-ebpf-object
          path: ebpf/rustinel-ebpf.o
          retention-days: 1

  # ── Tests ───────────────────────────────────────────────────────────────────
  test-linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    needs: ebpf-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Download eBPF artifact
        uses: actions/download-artifact@v8
        with:
          name: rustinel-ebpf-object
          path: ebpf/
      - run: cargo test --locked --verbose

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --verbose

  # ── Release Builds ──────────────────────────────────────────────────────────
  # Only run on version tags; each job uploads a single binary artifact.
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    needs: ebpf-build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Download eBPF artifact
        uses: actions/download-artifact@v8
        with:
          name: rustinel-ebpf-object
          path: ebpf/

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build
        run: cargo build --locked --release --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v7
        with:
          name: rustinel-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/rustinel
          retention-days: 1

  build-linux-arm64:
    name: Build Linux arm64
    runs-on: ubuntu-latest
    needs: ebpf-build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Download eBPF artifact
        uses: actions/download-artifact@v8
        with:
          name: rustinel-ebpf-object
          path: ebpf/

      # cross uses Docker (pre-installed on ubuntu-latest) to provide the
      # aarch64-linux-musl sysroot without any manual toolchain setup.
      # All deps are pure Rust so no extra cross-compilation wrappers are needed.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --locked --release --target aarch64-unknown-linux-musl

      - uses: actions/upload-artifact@v7
        with:
          name: rustinel-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/rustinel
          retention-days: 1

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release

      - name: Verify binary
        run: |
          if (!(Test-Path target/release/rustinel.exe)) {
            Write-Error "Binary not found"
            exit 1
          }
          $sizeMB = [math]::Round((Get-Item target/release/rustinel.exe).Length / 1MB, 2)
          Write-Output "Binary: target/release/rustinel.exe ($sizeMB MB)"

      - uses: actions/upload-artifact@v7
        with:
          name: rustinel-windows-x86_64
          path: target/release/rustinel.exe
          retention-days: 1

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy-linux
      - clippy-windows
      - test-linux
      - test-windows
      - build-linux-x86_64
      - build-linux-arm64
      - build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: rustinel-linux-x86_64
          path: dist/linux-x86_64/

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: rustinel-linux-arm64
          path: dist/linux-arm64/

      - name: Download Windows x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: rustinel-windows-x86_64
          path: dist/windows-x86_64/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package Linux x86_64
        run: |
          PKG="rustinel-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl"
          mkdir -p "$PKG/rules/sigma" "$PKG/rules/yara" "$PKG/rules/ioc" "$PKG/logs"
          cp dist/linux-x86_64/rustinel "$PKG/"
          chmod +x "$PKG/rustinel"
          cp config.toml README.md rustinel.service "$PKG/"
          [[ -d rules/sigma ]] && cp -r rules/sigma/. "$PKG/rules/sigma/" || touch "$PKG/rules/sigma/.gitkeep"
          [[ -d rules/yara  ]] && cp -r rules/yara/.  "$PKG/rules/yara/"  || touch "$PKG/rules/yara/.gitkeep"
          [[ -d rules/ioc   ]] && cp -r rules/ioc/.   "$PKG/rules/ioc/"   || touch "$PKG/rules/ioc/.gitkeep"
          touch "$PKG/logs/.gitkeep"
          tar czf "$PKG.tar.gz" "$PKG"

      - name: Package Linux arm64
        run: |
          PKG="rustinel-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl"
          mkdir -p "$PKG/rules/sigma" "$PKG/rules/yara" "$PKG/rules/ioc" "$PKG/logs"
          cp dist/linux-arm64/rustinel "$PKG/"
          chmod +x "$PKG/rustinel"
          cp config.toml README.md rustinel.service "$PKG/"
          [[ -d rules/sigma ]] && cp -r rules/sigma/. "$PKG/rules/sigma/" || touch "$PKG/rules/sigma/.gitkeep"
          [[ -d rules/yara  ]] && cp -r rules/yara/.  "$PKG/rules/yara/"  || touch "$PKG/rules/yara/.gitkeep"
          [[ -d rules/ioc   ]] && cp -r rules/ioc/.   "$PKG/rules/ioc/"   || touch "$PKG/rules/ioc/.gitkeep"
          touch "$PKG/logs/.gitkeep"
          tar czf "$PKG.tar.gz" "$PKG"

      - name: Package Windows x86_64
        run: |
          PKG="rustinel-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc"
          mkdir -p "$PKG/rules/sigma" "$PKG/rules/yara" "$PKG/rules/ioc" "$PKG/logs"
          cp dist/windows-x86_64/rustinel.exe "$PKG/"
          cp config.toml README.md "$PKG/"
          [[ -d rules/sigma ]] && cp -r rules/sigma/. "$PKG/rules/sigma/" || touch "$PKG/rules/sigma/.gitkeep"
          [[ -d rules/yara  ]] && cp -r rules/yara/.  "$PKG/rules/yara/"  || touch "$PKG/rules/yara/.gitkeep"
          [[ -d rules/ioc   ]] && cp -r rules/ioc/.   "$PKG/rules/ioc/"   || touch "$PKG/rules/ioc/.gitkeep"
          touch "$PKG/logs/.gitkeep"
          zip -r "$PKG.zip" "$PKG"

      - name: Generate SHA256 checksums
        run: |
          sha256sum \
            rustinel-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz \
            rustinel-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl.tar.gz \
            rustinel-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip \
            > rustinel-${{ steps.version.outputs.version }}-checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rustinel-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz
            rustinel-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl.tar.gz
            rustinel-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip
            rustinel-${{ steps.version.outputs.version }}-checksums-sha256.txt
          generate_release_notes: true
          draft: false
          prerelease: false
          name: Rustinel ${{ github.ref_name }}
          body: |
            ## Downloads

            | Platform | Architecture | Package |
            |---|---|---|
            | Linux | x86_64 | `rustinel-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux | arm64 | `rustinel-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl.tar.gz` |
            | Windows | x86_64 | `rustinel-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip` |

            ## Linux

            ```sh
            tar xzf rustinel-${{ steps.version.outputs.version }}-<arch>.tar.gz
            cd rustinel-${{ steps.version.outputs.version }}-<arch>
            # Customize config.toml, add rules to rules/
            sudo ./rustinel run
            ```

            A `rustinel.service` systemd unit file is included in the archive for persistent deployment.

            **Requirements:** Linux 5.8+ with BTF enabled, `CAP_BPF` or root.

            ## Windows

            1. Extract the ZIP
            2. Customize `config.toml`, add rules to `rules/`
            3. Run as Administrator: `.\rustinel.exe run`

            **Requirements:** Windows 10/11 or Server 2016+ (x64), Administrator privileges.
