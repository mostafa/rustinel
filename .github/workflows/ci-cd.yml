name: CI/CD

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Clippy ──────────────────────────────────────────────────────────────────
  # Run on all platforms so Linux-specific code (aya, libc), Windows-specific
  # code (ferrisetw, windows-rs), and macOS-specific code are each linted
  # natively.
  clippy-linux:
    name: Clippy (Linux)
    runs-on: ubuntu-latest
    needs: ebpf-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Download eBPF artifact
        uses: actions/download-artifact@v8
        with:
          name: rustinel-ebpf-object
          path: ebpf/
      - run: cargo clippy --locked --all-targets -- -D clippy::all

  clippy-windows:
    name: Clippy (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --all-targets -- -D clippy::all

  clippy-macos:
    name: Clippy (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --all-targets -- -D clippy::all

# ── eBPF Build ──────────────────────────────────────────────────────────────
  # Produces the BPF bytecode object that is embedded into the Linux binary
  # at compile time (build.rs looks for ebpf/rustinel-ebpf.o).
  # The bpfel-unknown-none target is architecture-agnostic, so one artifact
  # serves both x86_64 and arm64 Linux.
  ebpf-build:
    name: Linux eBPF Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup nightly Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Cache bpf-linker binary
        id: cache-bpf-linker
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/bpf-linker
          key: bpf-linker-${{ runner.os }}-${{ hashFiles('ebpf/Cargo.toml') }}

      - name: Install bpf-linker
        if: steps.cache-bpf-linker.outputs.cache-hit != 'true'
        run: cargo install bpf-linker

      - name: Build eBPF object
        run: |
          cd ebpf
          cargo build --release
          cp target/bpfel-unknown-none/release/rustinel-ebpf rustinel-ebpf.o

      - name: Upload eBPF artifact
        uses: actions/upload-artifact@v7
        with:
          name: rustinel-ebpf-object
          path: ebpf/rustinel-ebpf.o
          retention-days: 1

  # ── Tests ───────────────────────────────────────────────────────────────────
  test-linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    needs: ebpf-build
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - name: Download eBPF artifact
        uses: actions/download-artifact@v8
        with:
          name: rustinel-ebpf-object
          path: ebpf/
      - run: cargo test --locked --verbose

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --verbose

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --verbose

  # ── Release Builds ──────────────────────────────────────────────────────────
  # Only run on version tags; each job uploads a single binary artifact.
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    needs: ebpf-build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Download eBPF artifact
        uses: actions/download-artifact@v8
        with:
          name: rustinel-ebpf-object
          path: ebpf/

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build
        run: cargo build --locked --release --features rsigma-engine --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v7
        with:
          name: rustinel-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/rustinel
          retention-days: 1

  build-linux-arm64:
    name: Build Linux arm64
    runs-on: ubuntu-latest
    needs: ebpf-build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Download eBPF artifact
        uses: actions/download-artifact@v8
        with:
          name: rustinel-ebpf-object
          path: ebpf/

      # cross uses Docker (pre-installed on ubuntu-latest) to provide the
      # aarch64-linux-musl sysroot without any manual toolchain setup.
      # All deps are pure Rust so no extra cross-compilation wrappers are needed.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --locked --release --features rsigma-engine --target aarch64-unknown-linux-musl

      - uses: actions/upload-artifact@v7
        with:
          name: rustinel-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/rustinel
          retention-days: 1

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release --features rsigma-engine

      - name: Verify binary
        run: |
          if (!(Test-Path target/release/rustinel.exe)) {
            Write-Error "Binary not found"
            exit 1
          }
          $sizeMB = [math]::Round((Get-Item target/release/rustinel.exe).Length / 1MB, 2)
          Write-Output "Binary: target/release/rustinel.exe ($sizeMB MB)"

      - uses: actions/upload-artifact@v7
        with:
          name: rustinel-windows-x86_64
          path: target/release/rustinel.exe
          retention-days: 1

  # macOS builds run on the arm64 runner; the x86_64 target cross-compiles
  # there since the SDK ships both slices. Endpoint Security uses a restricted
  # entitlement, so the daemon is packaged in an app-like bundle with its
  # provisioning profile before signing and notarization.
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --locked --release --features rsigma-engine --target ${{ matrix.target }}

      - name: Import signing identity
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          : "${SIGN_IDENTITY:?MACOS_SIGN_IDENTITY is required}"
          : "${CERT_P12_BASE64:?MACOS_CERT_P12_BASE64 is required}"
          : "${CERT_PASSWORD:?MACOS_CERT_PASSWORD is required}"
          KEYCHAIN="$RUNNER_TEMP/rustinel-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build signed app bundle
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          PROVISION_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          : "${PROVISION_PROFILE_BASE64:?MACOS_PROVISIONING_PROFILE_BASE64 is required}"
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/rustinel.provisionprofile"
          scripts/macos/package-app.sh \
            --binary "target/${{ matrix.target }}/release/rustinel" \
            --output "$RUNNER_TEMP/Rustinel.app" \
            --profile "$RUNNER_TEMP/rustinel.provisionprofile" \
            --identity "$SIGN_IDENTITY" \
            --version "${GITHUB_REF_NAME#v}"

      - name: Notarize and staple
        env:
          NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          : "${NOTARY_APPLE_ID:?MACOS_NOTARY_APPLE_ID is required}"
          : "${NOTARY_TEAM_ID:?MACOS_NOTARY_TEAM_ID is required}"
          : "${NOTARY_PASSWORD:?MACOS_NOTARY_PASSWORD is required}"
          ditto -c -k --keepParent "$RUNNER_TEMP/Rustinel.app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple "$RUNNER_TEMP/Rustinel.app"
          xcrun stapler validate "$RUNNER_TEMP/Rustinel.app"
          spctl --assess --type execute --verbose=4 "$RUNNER_TEMP/Rustinel.app"

      - name: Package macOS ${{ matrix.arch }}
        run: |
          PKG="rustinel-${GITHUB_REF_NAME#v}-${{ matrix.target }}"
          mkdir -p "$PKG/rules/sigma" "$PKG/rules/yara" "$PKG/rules/ioc" "$PKG/logs" "$PKG/scripts/install" "$PKG/examples"
          ditto "$RUNNER_TEMP/Rustinel.app" "$PKG/Rustinel.app"
          ln -s "Rustinel.app/Contents/MacOS/rustinel" "$PKG/rustinel"
          cp config.toml README.md packaging/macos/com.rustinel.agent.plist "$PKG/"
          cp scripts/install/install.sh scripts/install/install.ps1 "$PKG/scripts/install/"
          cp -r examples/siem "$PKG/examples/"
          chmod +x "$PKG/scripts/install/install.sh" "$PKG/examples/siem/splunk/send-alerts.py"
          [[ -d rules/sigma ]] && cp -r rules/sigma/. "$PKG/rules/sigma/" || touch "$PKG/rules/sigma/.gitkeep"
          [[ -d rules/yara  ]] && cp -r rules/yara/.  "$PKG/rules/yara/"  || touch "$PKG/rules/yara/.gitkeep"
          [[ -d rules/ioc   ]] && cp -r rules/ioc/.   "$PKG/rules/ioc/"   || touch "$PKG/rules/ioc/.gitkeep"
          touch "$PKG/logs/.gitkeep"
          tar czf "$PKG.tar.gz" "$PKG"

      - uses: actions/upload-artifact@v7
        with:
          name: rustinel-macos-${{ matrix.arch }}
          path: rustinel-*-${{ matrix.target }}.tar.gz
          retention-days: 1

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy-linux
      - clippy-windows
      - clippy-macos
      - test-linux
      - test-windows
      - test-macos
      - build-linux-x86_64
      - build-linux-arm64
      - build-windows
      - build-macos
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download Linux x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: rustinel-linux-x86_64
          path: dist/linux-x86_64/

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: rustinel-linux-arm64
          path: dist/linux-arm64/

      - name: Download Windows x86_64 binary
        uses: actions/download-artifact@v8
        with:
          name: rustinel-windows-x86_64
          path: dist/windows-x86_64/

      - name: Download macOS arm64 package
        uses: actions/download-artifact@v8
        with:
          name: rustinel-macos-arm64
          path: dist/macos-arm64/

      - name: Download macOS x86_64 package
        uses: actions/download-artifact@v8
        with:
          name: rustinel-macos-x86_64
          path: dist/macos-x86_64/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package Linux x86_64
        run: |
          PKG="rustinel-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl"
          mkdir -p "$PKG/rules/sigma" "$PKG/rules/yara" "$PKG/rules/ioc" "$PKG/logs" "$PKG/scripts/install" "$PKG/examples"
          cp dist/linux-x86_64/rustinel "$PKG/"
          chmod +x "$PKG/rustinel"
          cp config.toml README.md rustinel.service "$PKG/"
          cp scripts/install/install.sh scripts/install/install.ps1 "$PKG/scripts/install/"
          cp -r examples/siem "$PKG/examples/"
          chmod +x "$PKG/scripts/install/install.sh" "$PKG/examples/siem/splunk/send-alerts.py"
          [[ -d rules/sigma ]] && cp -r rules/sigma/. "$PKG/rules/sigma/" || touch "$PKG/rules/sigma/.gitkeep"
          [[ -d rules/yara  ]] && cp -r rules/yara/.  "$PKG/rules/yara/"  || touch "$PKG/rules/yara/.gitkeep"
          [[ -d rules/ioc   ]] && cp -r rules/ioc/.   "$PKG/rules/ioc/"   || touch "$PKG/rules/ioc/.gitkeep"
          touch "$PKG/logs/.gitkeep"
          tar czf "$PKG.tar.gz" "$PKG"

      - name: Package Linux arm64
        run: |
          PKG="rustinel-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl"
          mkdir -p "$PKG/rules/sigma" "$PKG/rules/yara" "$PKG/rules/ioc" "$PKG/logs" "$PKG/scripts/install" "$PKG/examples"
          cp dist/linux-arm64/rustinel "$PKG/"
          chmod +x "$PKG/rustinel"
          cp config.toml README.md rustinel.service "$PKG/"
          cp scripts/install/install.sh scripts/install/install.ps1 "$PKG/scripts/install/"
          cp -r examples/siem "$PKG/examples/"
          chmod +x "$PKG/scripts/install/install.sh" "$PKG/examples/siem/splunk/send-alerts.py"
          [[ -d rules/sigma ]] && cp -r rules/sigma/. "$PKG/rules/sigma/" || touch "$PKG/rules/sigma/.gitkeep"
          [[ -d rules/yara  ]] && cp -r rules/yara/.  "$PKG/rules/yara/"  || touch "$PKG/rules/yara/.gitkeep"
          [[ -d rules/ioc   ]] && cp -r rules/ioc/.   "$PKG/rules/ioc/"   || touch "$PKG/rules/ioc/.gitkeep"
          touch "$PKG/logs/.gitkeep"
          tar czf "$PKG.tar.gz" "$PKG"

      - name: Package Windows x86_64
        run: |
          PKG="rustinel-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc"
          mkdir -p "$PKG/rules/sigma" "$PKG/rules/yara" "$PKG/rules/ioc" "$PKG/logs" "$PKG/scripts/install" "$PKG/examples"
          cp dist/windows-x86_64/rustinel.exe "$PKG/"
          cp config.toml README.md "$PKG/"
          cp scripts/install/install.sh scripts/install/install.ps1 "$PKG/scripts/install/"
          cp -r examples/siem "$PKG/examples/"
          [[ -d rules/sigma ]] && cp -r rules/sigma/. "$PKG/rules/sigma/" || touch "$PKG/rules/sigma/.gitkeep"
          [[ -d rules/yara  ]] && cp -r rules/yara/.  "$PKG/rules/yara/"  || touch "$PKG/rules/yara/.gitkeep"
          [[ -d rules/ioc   ]] && cp -r rules/ioc/.   "$PKG/rules/ioc/"   || touch "$PKG/rules/ioc/.gitkeep"
          touch "$PKG/logs/.gitkeep"
          zip -r "$PKG.zip" "$PKG"

      # The macOS archives are signed and packaged on the macOS runner; stage
      # them next to the other release assets.
      - name: Stage macOS packages
        run: |
          cp dist/macos-arm64/*.tar.gz .
          cp dist/macos-x86_64/*.tar.gz .

      - name: Generate SHA256 checksums
        run: |
          sha256sum \
            rustinel-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz \
            rustinel-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl.tar.gz \
            rustinel-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip \
            rustinel-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz \
            rustinel-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz \
            > rustinel-${{ steps.version.outputs.version }}-checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            rustinel-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz
            rustinel-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl.tar.gz
            rustinel-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip
            rustinel-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz
            rustinel-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz
            rustinel-${{ steps.version.outputs.version }}-checksums-sha256.txt
          generate_release_notes: true
          draft: false
          prerelease: false
          name: Rustinel ${{ github.ref_name }}
          body: |
            ## Downloads

            | Platform | Architecture | Package |
            |---|---|---|
            | Linux | x86_64 | `rustinel-${{ steps.version.outputs.version }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux | arm64 | `rustinel-${{ steps.version.outputs.version }}-aarch64-unknown-linux-musl.tar.gz` |
            | Windows | x86_64 | `rustinel-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip` |
            | macOS | arm64 | `rustinel-${{ steps.version.outputs.version }}-aarch64-apple-darwin.tar.gz` |
            | macOS | x86_64 | `rustinel-${{ steps.version.outputs.version }}-x86_64-apple-darwin.tar.gz` |

            ## Installer

            **Linux**

            ```sh
            curl -fsSL https://raw.githubusercontent.com/Karib0u/rustinel/main/scripts/install/install.sh | sh -s -- --version ${{ steps.version.outputs.version }} --run
            ```

            **macOS**

            ```sh
            curl -fsSL https://raw.githubusercontent.com/Karib0u/rustinel/main/scripts/install/install.sh | sh -s -- --version ${{ steps.version.outputs.version }}
            cd rustinel
            ```

            macOS support is experimental. Endpoint Security requires root and a one-time Full Disk Access approval before the first successful start. See the install guide for the interactive terminal and LaunchDaemon approval paths, then run:

            ```sh
            sudo ./rustinel run
            ```

            **Windows (PowerShell)**

            ```powershell
            iwr https://raw.githubusercontent.com/Karib0u/rustinel/main/scripts/install/install.ps1 -OutFile install-rustinel.ps1; powershell -ExecutionPolicy Bypass -File .\install-rustinel.ps1 -Version ${{ steps.version.outputs.version }} -Run
            ```

            Full install, configuration, and SIEM ingestion guides: https://docs.rustinel.io/getting-started/

            Scripts install published release binaries only. Verify downloads with `rustinel-${{ steps.version.outputs.version }}-checksums-sha256.txt`.
